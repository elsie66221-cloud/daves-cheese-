<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daves Cheese</title>
  <link href="https://fonts.googleapis.com/css2?
  family=Inter:wght@400;500;600;700&
  family=Epilogue:wght@400;600;700;800&
  family=Lora:ital,wght@0,400;0,500;0,600;1,400&
  display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="page active" id="page-home">
    <nav class="topnav topnav-mobile"></nav>
    <!-- MOBILE HOME CONTENT -->
    <div class="home-mobile">
        <section class="hero-mobile">
            <div class="hero-img-wrap">
                <img src="assets/images/hero-bg.jpg" alt="Fresh cheese" class="hero-img" onerror="this.style.background='#c8b8a2';this.removeAttribute('src')">
                <div class="hero-gradient"></div>
              </div>
              <div class="hero-text">
                <p class="hero-since">SINCE 1924</p>
                <h1 class="hero-title">Fresh Dairy<br><em class="hero-title-em">Excellence</em></h1>
                <p class="hero-desc">Farm Fresh, Cheese Perfected. Discover our collection of award-winning artisanal cheeses, crafted with passion and local heritage.</p>
                <div class="hero-btns">
                  <button class="btn-primary" data-nav="search">Shop Now</button>
                  <button class="btn-secondary">Our Process</button>
                </div>
              </div>
        </section>
        <section class="featured-section">
            <div id="featured-grid-mobile"></div>
        </section>
        <section class="categories-section">
            <div id="category-grid-mobile"></div>
        </section>
        <footer></footer>
    </div>
    <div class="home-desktop"></div>
  </div>
  <div class="page" id="page-search">
    <nav></nav>
    <div class="search-page-body">

    <!-- 侧边栏 -->
    <aside id="search-sidebar"></aside>

    <!-- 主内容 -->
    <div class="search-main">

      <!-- 分类筛选（后面JS填） -->
      <div id="category-filters"></div>

      <!-- 商品列表 -->
      <div id="search-results-grid"></div>

      <!-- 分页 -->
      <div id="pagination"></div>
    </div>
  </div>
  <div class="page" id="page-product">
    <nav></nav>

    <div id="product-page-body"></div>
  
  </div>
  <div class="page" id="page-cart">
    <nav></nav>

    <div id="cart-page-body"></div>
  
  </div>
  <div class="page" id="page-payment">
    <nav></nav>

    <div id="payment-page-body"></div>
  </div>
  <div class="page" id="page-confirm">
    <nav></nav>
    
    <div id="confirm-page-body"></div>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
